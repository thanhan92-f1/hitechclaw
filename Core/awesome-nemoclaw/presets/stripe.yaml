# This is an example preset. Customize it for your own environment before use.

preset:
  name: stripe
  description: "Stripe API access (least-privilege example)"

network_policies:
  stripe:
    name: stripe
    endpoints:
      - host: api.stripe.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/v1/**" }
          - allow: { method: POST, path: "/v1/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
