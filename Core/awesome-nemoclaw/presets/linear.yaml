# This is an example preset. Customize it for your own environment before use.

preset:
  name: linear
  description: "Linear GraphQL API access (least-privilege example)"

network_policies:
  linear:
    name: linear
    endpoints:
      - host: api.linear.app
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/graphql" }
    binaries:
      - { path: /usr/local/bin/openclaw }
