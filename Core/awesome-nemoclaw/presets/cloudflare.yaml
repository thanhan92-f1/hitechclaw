# This is an example preset. Customize it for your own environment before use.

preset:
  name: cloudflare
  description: "Cloudflare API access (least-privilege example)"

network_policies:
  cloudflare:
    name: cloudflare
    endpoints:
      - host: api.cloudflare.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/client/v4/**" }
          - allow: { method: POST, path: "/client/v4/**" }
          - allow: { method: PATCH, path: "/client/v4/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
