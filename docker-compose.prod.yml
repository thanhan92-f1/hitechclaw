# ============================================================
# HiTechClaw Production Docker Compose
# Production deploy with prebuilt registry images
# Usage:
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_USER: hitechclaw
      POSTGRES_PASSWORD: ${PG_PASSWORD:?Set PG_PASSWORD in .env.prod}
      POSTGRES_DB: hitechclaw
    ports: []
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      [
        "postgres",
        "-c",
        "shared_buffers=256MB",
        "-c",
        "effective_cache_size=768MB",
        "-c",
        "maintenance_work_mem=128MB",
        "-c",
        "max_connections=100",
        "-c",
        "log_min_duration_statement=200",
        "-c",
        "log_statement=ddl"
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hitechclaw"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── MongoDB ─────────────────────────────────────────────
  mongodb:
    restart: unless-stopped
    ports: []
    volumes:
      - mongodata:/data/db
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5", "--quiet"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────
  redis:
    restart: unless-stopped
    ports: []
    volumes:
      - redisdata:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--save",
        "900",
        "1",
        "--save",
        "300",
        "10"
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── HiTechClaw Server ───────────────────────────────────
  hitechclaw:
    image: ${HITECHCLAW_SERVER_IMAGE:-hitechclaw/hitechclaw-server:latest}
    build: !reset null
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5001
      DATABASE_URL: postgresql://hitechclaw:${PG_PASSWORD}@postgres:5432/hitechclaw
      MONGODB_URL: mongodb://mongodb:27017/hitechclaw
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      CORS_ORIGINS: ${CORS_ORIGINS}
      OPENSHELL_ENABLED: ${OPENSHELL_ENABLED:-false}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?Set CREDENTIAL_ENCRYPTION_KEY in .env.prod}
    ports:
      - "0.0.0.0:5102:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Web Frontend ───────────────────────────────────────
  web:
    image: ${HITECHCLAW_WEB_IMAGE:-hitechclaw/hitechclaw-web:latest}
    build: !reset null
    restart: unless-stopped
    ports:
      - "0.0.0.0:3101:80"
    depends_on:
      hitechclaw:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  mongodata:
  redisdata: